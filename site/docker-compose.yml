services:
  # Production: build static site + serve via nginx on http://localhost:8080
  site:
    build:
      context: .
      dockerfile: Dockerfile
    image: skillsetc-site:latest
    container_name: skillsetc-site
    ports:
      - "${SITE_PORT:-80}:80"
    restart: unless-stopped

  # Dev: hot-reload Astro dev server on http://localhost:4321
  dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: skillsetc-site-dev:latest
    container_name: skillsetc-site-dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev
