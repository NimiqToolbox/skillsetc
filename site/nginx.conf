server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets
    location ~* \.(?:woff2|woff|ttf|css|js|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Pagefind index — short cache (regenerated on each build)
    location /pagefind/ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Clean URLs: try the literal path, then .html, then directory index, then 404.
    # Note: NO `$uri/` — that triggers nginx's auto trailing-slash redirect.
    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Custom 404 page (served with 404 status)
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types
      text/plain
      text/css
      application/json
      application/javascript
      text/xml
      application/xml
      application/xml+rss
      text/javascript
      image/svg+xml
      application/wasm;
    gzip_min_length 1024;
}
